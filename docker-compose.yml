services:
  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    # ✅ Bỏ --replSet, thêm --bind_ip_all để các service khác kết nối được
    command: mongod --bind_ip_all
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - pms-net

  user-service:
    build: ./user-service
    volumes:
      - ./user-service:/app
      - /app/node_modules
      - ./proto:/proto
    environment:
      - MONGO_URI=mongodb://mongodb:27017/user_db
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - pms-net

  project-service:
    build: ./project-service
    volumes:
      - ./project-service:/app
      - /app/node_modules
      - ./proto:/proto
    environment:
      - MONGO_URI=mongodb://mongodb:27017/project_db
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - pms-net

  task-service:
    build: ./task-service
    volumes:
      - ./task-service:/app
      - /app/node_modules
      - ./proto:/proto
    environment:
      - MONGO_URI=mongodb://mongodb:27017/task_db
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - pms-net

  api-gateway:
    build: ./api-gateway
    ports:
      - "3000:3000"
    volumes:
      - ./api-gateway:/app
      - /app/node_modules
      - ./proto:/proto
    depends_on:
      user-service:
        condition: service_started
      project-service:
        condition: service_started
      task-service:
        condition: service_started
    networks:
      - pms-net

networks:
  pms-net:
    driver: bridge

volumes:
  mongo-data:
